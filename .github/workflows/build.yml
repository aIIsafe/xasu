name: Build Xasu IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          ls -la *.xcodeproj || (echo "ERROR: No xcodeproj generated!" && exit 1)

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ hashFiles('project.yml') }}

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Xasu.xcodeproj \
            -scheme Xasu \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Xasu.xcodeproj \
            -scheme Xasu \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${{ runner.temp }}/DerivedData" \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee "${{ runner.temp }}/build.log"

      - name: Package IPA
        run: |
          echo "=== Searching for Xasu.app ==="
          find "${{ runner.temp }}/DerivedData" -name "Xasu.app" -type d 2>/dev/null

          APP_PATH=$(find "${{ runner.temp }}/DerivedData" \
            -name "Xasu.app" -type d \
            -not -path "*/Index.noindex/*" \
            | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Xasu.app not found"
            find "${{ runner.temp }}/DerivedData" -maxdepth 6 -type d | head -40
            exit 1
          fi

          echo "Found app: $APP_PATH"

          # Проверяем что XasuTunnel.appex внутри
          echo "=== PlugIns ==="
          ls "$APP_PATH/PlugIns/" 2>/dev/null || echo "No PlugIns directory"

          mkdir -p "${{ runner.temp }}/Payload"
          cp -r "$APP_PATH" "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}"
          zip -r Xasu.ipa Payload
          ls -lh Xasu.ipa
          echo "✅ Xasu.ipa created!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Xasu-unsigned
          path: ${{ runner.temp }}/Xasu.ipa
          retention-days: 30

      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== Last 150 lines of build log ==="
          tail -150 "${{ runner.temp }}/build.log" 2>/dev/null || echo "No log"

      - name: Summary
        if: always()
        run: |
          echo "## Xasu Build" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- iOS target: 17.0+" >> $GITHUB_STEP_SUMMARY
          echo "- Includes: Xasu.app + XasuTunnel.appex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo "Download IPA from Artifacts → install via **Sideloadly**." >> $GITHUB_STEP_SUMMARY
          echo "In Sideloadly enable **'Use Apple account' + 'Normal install'**." >> $GITHUB_STEP_SUMMARY
