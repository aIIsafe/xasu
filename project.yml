# project.yml — xcodegen spec для Xasu
# Два таргета: основное приложение + Network Extension (XasuTunnel)
# Генерация: xcodegen generate

name: Xasu

options:
  bundleIdPrefix: com.xasu.dpiswitch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  SwByeDPI:
    url: https://github.com/mIwr/SwByeDPI
    from: "0.17.3"
  Tun2SocksKit:
    url: https://github.com/EbrahimTahernejad/Tun2SocksKit
    from: "5.14.4"

targets:

  # ── Основное приложение ────────────────────────────────────────
  Xasu:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Xasu

    info:
      path: Xasu/Info.plist

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xasu.dpiswitch
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_BITCODE: NO
        ENABLE_PREVIEWS: YES
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        # Entitlements встраиваются в бинарник — Sideloadly их подхватывает при подписи
        CODE_SIGN_ENTITLEMENTS: Xasu/Xasu.entitlements

    dependencies:
      # SwByeDPI нужен для SOCKS fallback (когда VPN entitlement недоступен)
      - package: SwByeDPI
        product: SwByeDPI
      - package: SwByeDPI
        product: ByeDPIKit
      # Внедряем extension в бандл приложения
      - target: XasuTunnel
        embed: true

  # ── Network Extension ──────────────────────────────────────────
  XasuTunnel:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: XasuTunnel

    info:
      path: XasuTunnel/Info.plist
      properties:
        CFBundleName: XasuTunnel
        CFBundleDisplayName: XasuTunnel
        CFBundlePackageType: "XPC!"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xasu.dpiswitch.tunnel
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_BITCODE: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_ENTITLEMENTS: XasuTunnel/XasuTunnel.entitlements

    dependencies:
      - package: SwByeDPI
        product: SwByeDPI
      - package: SwByeDPI
        product: ByeDPIKit
      - package: Tun2SocksKit
        product: Tun2SocksKit
